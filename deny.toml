[advisories]
ignore = [
    # Pingora transitive dependencies; not under our control.
    # protobuf 2.28.0: uncontrolled recursion crash
    "RUSTSEC-2024-0437",
    # daemonize 0.5.0: unmaintained
    "RUSTSEC-2025-0069",
    # derivative 2.2.0: unmaintained
    "RUSTSEC-2024-0388",
    # rustls-pemfile 2.2.0: unmaintained (via pingora-rustls)
    "RUSTSEC-2025-0134",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "LGPL-3.0-only",
    "LGPL-3.0-or-later",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
